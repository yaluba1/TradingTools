info:
  name: Historical OHLC Bar Data
  type: http
  seq: 1

http:
  method: GET
  url: https://localhost:{{gw_port}}/v1/api/iserver/marketdata/history?conid=265598&period=15d&bar=1d
  params:
    - name: conid
      value: "265598"
      type: query
    - name: period
      value: 15d
      type: query
    - name: bar
      value: 1d
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
