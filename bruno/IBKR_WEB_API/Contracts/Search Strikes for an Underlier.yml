info:
  name: Search Strikes for an Underlier
  type: http
  seq: 12

http:
  method: GET
  url: https://localhost:{{gw_port}}/v1/api/iserver/secdef/strikes?conid=468091282&sectype=OPT&month=JUN26&exchange=SMART
  params:
    - name: conid
      value: "468091282"
      type: query
    - name: sectype
      value: OPT
      type: query
    - name: month
      value: JUN26
      type: query
    - name: exchange
      value: SMART
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
