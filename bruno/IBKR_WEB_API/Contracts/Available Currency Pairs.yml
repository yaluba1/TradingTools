info:
  name: Available Currency Pairs
  type: http
  seq: 6

http:
  method: GET
  url: https://localhost:{{gw_port}}/v1/api/iserver/currency/pairs?currency=EUR
  params:
    - name: currency
      value: EUR
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
