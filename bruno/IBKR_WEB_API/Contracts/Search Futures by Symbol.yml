info:
  name: Search Futures by Symbol
  type: http
  seq: 14

http:
  method: GET
  url: https://localhost:{{gw_port}}/v1/api/trsrv/futures?symbols=ES,MES
  params:
    - name: symbols
      value: ES,MES
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
