info:
  name: Search Bond Filter Information
  type: http
  seq: 8

http:
  method: GET
  url: https://localhost:{{gw_port}}/v1/api/iserver/secdef/bond-filters?symbol=BOND&issuerId=e1400715
  params:
    - name: symbol
      value: BOND
      type: query
    - name: issuerId
      value: e1400715
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Request a list of filters relating to a given Bond issuerID.
  symbol=BOND
  IssuerId can be retrieved from the /iserver/secdef/search endpoint searching for a genric bond symbol and using the BOND secType.
