info:
  name: Currency Exchange Rate
  type: http
  seq: 7

http:
  method: GET
  url: https://localhost:{{gw_port}}/v1/api/iserver/exchangerate?target=CZK&source=EUR
  params:
    - name: target
      value: CZK
      type: query
    - name: source
      value: EUR
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
