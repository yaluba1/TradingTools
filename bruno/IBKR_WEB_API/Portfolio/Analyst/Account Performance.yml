info:
  name: Account Performance
  type: http
  seq: 1

http:
  method: POST
  url: https://127.0.0.1:{{gw_port}}/v1/api/pa/performance
  body:
    type: json
    data: |-
      {
        "acctIds": [ "{{accountId}}" ],
        "period": "1M"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
