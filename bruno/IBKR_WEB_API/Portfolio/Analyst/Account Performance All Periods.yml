  url: https://127.0.0.1:{{gw_port}}/v1/api/pa/allperiods
  body:
    type: json
    data: |-
      {
        "acctIds": [ "{{accountId}}" ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
