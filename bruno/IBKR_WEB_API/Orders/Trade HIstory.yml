info:
  name: Trade HIstory
  type: http
  seq: 3

http:
  method: GET
  url: https://localhost:{{gw_port}}/v1/api/iserver/account/trades
  params:
    - name: days
      value: "7"
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Parameter "days" is the number of prior days prior to include in response, up to a maximum of 7. If omitted, only the current day's executions will be returned.
