info:
  name: List Open Orders
  type: http
  seq: 2

http:
  method: GET
  url: https://localhost:{{gw_port}}/v1/api/iserver/account/orders?filters=Submitted
  params:
    - name: force
      value: "true"
      type: query
      disabled: true
    - name: filters
      value: Submitted
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
