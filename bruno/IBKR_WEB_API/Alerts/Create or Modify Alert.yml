  url: https://localhost:{{gw_port}}/v1/api/iserver/account/{{accountId}}/alert
  body:
    type: json
    data: |-
      {
        "alertName": "AAPL_Price",
        "alertMessage": "AAPL Price Drop!",
        "alertRepeatable": 0,
        "email": "juan.noguera@ntec.es",
        "expireTime": "20261231-12:00:00",
        "iTWSOrdersOnly": 0,
        "outsideRth": 0,
        "sendMessage": 1,
        "showPopup": 1,
        "tif": "GTC",
        "conditions": [
          {
            "conidex": 265598,
            "logicBind": "a", 
