info:
  name: Create or Modify Alert
  type: http
  seq: 1

http:
  method: POST
  url: https://localhost:{{gw_port}}/v1/api/iserver/account/{{accountId}}/alert
  headers:
    - name: User-Agent
      value: Console
  body:
    type: json
    data: |-
      {
        "alertName": "USD_EUR",
        "alertMessage": "USD to EUR cross",
        "alertRepeatable": 0,
        "toolId": 1,
        "email": "juan.noguera@ntec.es",
        "expireTime": "20261231-12:00:00",
        "iTWSOrdersOnly": 0,
        "outsideRth": 0,
        "sendMessage": 1,
        "showPopup": 1,
        "tif": "GTC",
        "conditions": [
          {
            "conidex": "12087792",
            "logicBind": "a",
            "operator": ">=",
            "timeZone": "US/Eastern",
            "triggerMethod": "0",
            "type": 5,
            "value": "100"
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
